<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Project tile: scholarly mobility and networks</title>
<desc>A square cream tile showing two research institutions connected by a co-authorship network, with a coral arc tracing a scholar's first career move between them.</desc>
