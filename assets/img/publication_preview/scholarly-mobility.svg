<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="680" rx="64" fill="#fafaf7"/>

<line x1="293" y1="389" x2="387" y2="291" stroke="#5ec8e8" stroke-width="7" stroke-linecap="round"/>

